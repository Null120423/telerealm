version: "3.8"
services:
  telerealm:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telerealm
    ports:
      - "7777:7777"
    environment:
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-telerealm-default-encryption-key-32b}
      - GIN_MODE=${GIN_MODE:-release}
      - MULTIPART_STORAGE_DIR=${MULTIPART_STORAGE_DIR:-/app/storage/multipart}
    volumes:
      - ./data/multipart:/app/storage/multipart
    restart: unless-stopped

